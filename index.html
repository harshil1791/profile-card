<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harshil Profile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/37dcb657e1.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="profile-card">
        <div class="image">
            <img src="images/WhatsApp Image 2026-03-17 at 1.41.28 PM c.jpeg" alt="profile-pic" class="profile-img">
        </div>
        <div class="profile-text">
            <span class="name">Harshil Edits</span>
            <span class="profession">Youtuber &amp; Editor</span>
        </div>
        <div class="icons">
            <a href="https://www.youtube.com/@BAKA_YAGA" style="background-color: #FF0033;">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="" style="background-color: #D51869;">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="" style="background-color: #1E3050;">
                <i class="fa-brands fa-facebook"></i>
            </a>
            <a href="" style="background-color: #5C69F2;">
                <i class="fa-brands fa-discord"></i>
            </a>
        </div>
        <div class="buttons">
                <button class="button">Subscribe</button>
                <button class="button">Message</button>
            </div>
            <div class="analytics">
            <div class="data">
                <i class="fa-solid fa-eye"></i>
                <span class="number">400k+</span>
            </div>

            <div class="data">
                <i class="fa-solid fa-heart"></i>
                <span class="number">10k+</span>
            </div>

            <div class="data">
                <i class="fa-solid fa-comment"></i>
                <span class="number">200+</span>
            </div>

        </div>
    </div>
</body>

</html>
